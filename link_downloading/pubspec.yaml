name: link_downloading
description: "Downlo — Download videos instantly from any social media platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ─── UI ────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # ─── State Management ──────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── Navigation ────────────────────────────────────
  go_router: ^14.2.0

  # ─── Networking ────────────────────────────────────
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.5

  # ─── Local Storage ─────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # ─── Permissions ───────────────────────────────────
  permission_handler: ^11.3.1

  # ─── Media ─────────────────────────────────────────
  share_plus: ^9.0.0
  open_filex: ^4.5.0
  gal: ^2.3.0

  # ─── Notifications ─────────────────────────────────
  flutter_local_notifications: ^17.2.1+2

  # ─── Utils ─────────────────────────────────────────
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  flutter_foreground_task: ^9.2.2
  video_thumbnail: ^0.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
