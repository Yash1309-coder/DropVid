<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-container-high": "#1f1f1f",
                  "surface-tint": "#f9f9f9",
                  "surface-variant": "#262626",
                  "on-tertiary-fixed-variant": "#00526b",
                  "tertiary": "#a0e0ff",
                  "inverse-on-surface": "#555555",
                  "error-dim": "#d53d18",
                  "error": "#ff7351",
                  "surface-container-lowest": "#000000",
                  "on-surface": "#ffffff",
                  "secondary-dim": "#ea8400",
                  "surface-container-highest": "#262626",
                  "on-error-container": "#ffd2c8",
                  "primary-dim": "#ebebeb",
                  "primary-container": "#a0a1a1",
                  "tertiary-container": "#81d4fa",
                  "on-tertiary-container": "#00485e",
                  "on-surface-variant": "#ababab",
                  "on-background": "#ffffff",
                  "surface": "#0e0e0e",
                  "primary": "#f9f9f9",
                  "on-primary": "#5e5f60",
                  "on-primary-fixed": "#434545",
                  "on-secondary-fixed-variant": "#7a4300",
                  "secondary-fixed": "#ffc697",
                  "outline": "#757575",
                  "error-container": "#b92902",
                  "tertiary-fixed": "#81d4fa",
                  "on-tertiary-fixed": "#003343",
                  "primary-fixed-dim": "#dcdddd",
                  "inverse-surface": "#f9f9f9",
                  "background": "#000000",
                  "secondary-container": "#8e4e00",
                  "outline-variant": "#484848",
                  "primary-fixed": "#ebebeb",
                  "on-error": "#450900",
                  "secondary-fixed-dim": "#ffb470",
                  "tertiary-fixed-dim": "#72c6eb",
                  "on-secondary-container": "#fff6f1",
                  "on-primary-fixed-variant": "#5f6161",
                  "inverse-primary": "#5e5f60",
                  "on-secondary-fixed": "#512a00",
                  "secondary": "#fd9000",
                  "on-primary-container": "#212323",
                  "tertiary-dim": "#72c6eb",
                  "surface-container": "#191919",
                  "surface-container-low": "#131313",
                  "surface-bright": "#2c2c2c",
                  "surface-dim": "#0e0e0e",
                  "on-tertiary": "#00516a",
                  "on-secondary": "#462400"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Noto Serif"],
                  "body": ["Noto Serif"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .black-hole-gradient {
      background: radial-gradient(circle at center, #000000 0%, #000000 65%, #ffffff 100%);
    }
    .dot-grid-pattern {
      display: grid;
      grid-template-columns: repeat(3, 4px);
      gap: 2px;
      justify-content: center;
    }
    .dot {
      width: 4px;
      height: 4px;
      background-color: #fd9000;
      border-radius: 50%;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<button class="text-[#f9f9f9] active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-serif italic text-2xl tracking-tight text-[#f9f9f9]">DropVid...</h1>
<button class="text-[#f9f9f9] active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative px-6 py-24">
<!-- Title Section -->
<div class="absolute top-28 w-full text-center">
<h2 class="font-serif text-[#f9f9f9] text-5xl lowercase tracking-[0.2em] opacity-90">
        dropvid...
      </h2>
</div>
<!-- The Event Horizon (Central Sphere) -->
<div class="relative group">
<!-- Glow Effect -->
<div class="absolute inset-0 rounded-full bg-white/10 blur-[80px] scale-150 transition-all duration-1000 group-hover:bg-secondary/20"></div>
<!-- Main Action Button -->
<button class="relative w-64 h-64 rounded-full black-hole-gradient border border-white/20 shadow-[0_0_50px_rgba(255,255,255,0.1)] flex items-center justify-center overflow-hidden active:scale-95 transition-transform duration-500">
<div class="absolute inset-0 bg-gradient-to-tr from-secondary/0 to-secondary/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-white text-5xl font-light" data-icon="download">download</span>
</button>
</div>
<!-- Input Pathway -->
<div class="mt-20 w-full max-w-md space-y-8">
<div class="relative group">
<input class="w-full bg-transparent border border-white/20 focus:border-secondary transition-colors duration-500 py-6 px-4 font-serif text-xl text-center outline-none text-primary placeholder:text-on-surface-variant/40 rounded-lg" placeholder="Paste link into the void..." type="text"/>
</div>
<!-- Geometric Dot Icon & Label -->
<div class="flex flex-col items-center gap-3">
<div class="dot-grid-pattern">
<div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<span class="font-label text-[10px] tracking-[0.3em] text-on-surface-variant uppercase">VIDEOS</span>
</div>
</div>
<!-- Subtle Background Element -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 w-full h-full pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-px h-px bg-white shadow-[0_0_15px_2px_rgba(255,255,255,0.4)]"></div>
<div class="absolute top-1/2 right-1/3 w-px h-px bg-white shadow-[0_0_10px_1px_rgba(255,255,255,0.3)]"></div>
<div class="absolute bottom-1/4 left-1/2 w-px h-px bg-white shadow-[0_0_20px_3px_rgba(255,255,255,0.5)]"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-black/60 backdrop-blur-xl flex justify-around items-center h-20 px-8">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-[#fd9000] scale-110 hover:text-[#f9f9f9] transition-all transform scale-125 duration-500 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="home" style='font-variation-settings: "FILL" 1;'>home</span>
</a>
<!-- Downloads -->
<a class="flex flex-col items-center justify-center text-[#a8bda8] hover:text-[#f9f9f9] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="download_for_offline">download_for_offline</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-[#a8bda8] hover:text-[#f9f9f9] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="video_library">video_library</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#a8bda8] hover:text-[#f9f9f9] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
</body></html>
